# ── Sidra Media — local / generic Docker deployment ─────────────────
# One container. No Postgres, no Redis, no Celery, no nginx.
#
#   docker compose up -d --build
#   open http://localhost:8080   (login: admin / admin123)
#
services:
  sidra:
    build: .
    image: sidra-media:latest
    container_name: sidra-media
    ports:
      - "8080:3000"
    environment:
      # CHANGE THIS to a long random string.
      AUTH_SECRET: "${AUTH_SECRET:-please-change-this-to-a-long-random-secret}"
      # First-run admin (created only if no admin exists yet).
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@sidra.local}"
      # How many downloads run in parallel.
      MAX_CONCURRENT_DOWNLOADS: "2"
    volumes:
      # Database + thumbnail cache (persist app state).
      - sidra_data:/data
      # Where new downloads are written.
      - ./data/downloads/videos:/downloads/videos
      - ./data/downloads/audio:/downloads/audio
      # Your existing media libraries to browse & stream (read-only is fine).
      - ./data/library/videos:/media/videos
      - ./data/library/music:/media/music
    restart: unless-stopped

volumes:
  sidra_data:
    name: sidra_media_data
