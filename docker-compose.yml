# ============================================
# Sidra Video Downloader - Production Compose
# ============================================
# Usage: docker compose up -d --build

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    container_name: sidra-nginx
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - sidra_network
    restart: unless-stopped

  # ---- Next.js Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sidra-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    networks:
      - sidra_network
    restart: unless-stopped

  # ---- Flask Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sidra-backend
    environment:
      - FLASK_APP=${FLASK_APP:-wsgi.py}
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql://sidra:sidra_password@db:5432/sidra_downloader}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - DOWNLOAD_VIDEO_PATH=${DOWNLOAD_VIDEO_PATH:-/downloads/videos}
      - DOWNLOAD_AUDIO_PATH=${DOWNLOAD_AUDIO_PATH:-/downloads/audios}
      - MEDIA_VIDEO_PATH=${MEDIA_VIDEO_PATH:-/media/video}
      - MEDIA_AUDIO_PATH=${MEDIA_AUDIO_PATH:-/media/music}
    volumes:
      - downloads_videos:${DOWNLOAD_VIDEO_PATH:-/downloads/videos}
      - downloads_audios:${DOWNLOAD_AUDIO_PATH:-/downloads/audios}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sidra_network
    restart: unless-stopped

  # ---- Celery Worker ----
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sidra-worker
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      - FLASK_APP=${FLASK_APP:-wsgi.py}
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql://sidra:sidra_password@db:5432/sidra_downloader}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - DOWNLOAD_VIDEO_PATH=${DOWNLOAD_VIDEO_PATH:-/downloads/videos}
      - DOWNLOAD_AUDIO_PATH=${DOWNLOAD_AUDIO_PATH:-/downloads/audios}
      - MEDIA_VIDEO_PATH=${MEDIA_VIDEO_PATH:-/media/video}
      - MEDIA_AUDIO_PATH=${MEDIA_AUDIO_PATH:-/media/music}
    volumes:
      - downloads_videos:${DOWNLOAD_VIDEO_PATH:-/downloads/videos}
      - downloads_audios:${DOWNLOAD_AUDIO_PATH:-/downloads/audios}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sidra_network
    restart: unless-stopped

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: sidra-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sidra}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sidra_password}
      - POSTGRES_DB=${POSTGRES_DB:-sidra_downloader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sidra_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sidra} -d ${POSTGRES_DB:-sidra_downloader}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: sidra-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sidra_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ---- Volumes ----
volumes:
  postgres_data:
    name: sidra_postgres_data
  redis_data:
    name: sidra_redis_data
  downloads_videos:
    name: sidra_downloads_videos
  downloads_audios:
    name: sidra_downloads_audios

# ---- Networks ----
networks:
  sidra_network:
    name: sidra_network
    driver: bridge
