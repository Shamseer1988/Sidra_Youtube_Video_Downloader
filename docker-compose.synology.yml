# ── Sidra Media — Synology NAS deployment ───────────────────────────
# Use with Container Manager (Project) or Portainer.
#
# 1. Copy this repo to your NAS (e.g. /volume1/docker/sidra-media).
# 2. Adjust the host paths below to your shared folders.
# 3. In Container Manager → Project → Create → point at this file.
#
# Streams your existing Video Station / Audio Station libraries AND
# saves new downloads back onto the NAS — a Jellyfin + yt-dlp combo.
#
services:
  sidra:
    build: .
    image: sidra-media:latest
    container_name: sidra-media
    ports:
      - "8080:3000"
    environment:
      AUTH_SECRET: "change-this-to-a-long-random-secret"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "changeme"
      ADMIN_EMAIL: "admin@sidra.local"
      MAX_CONCURRENT_DOWNLOADS: "2"
      # Display name shown in the dashboard's storage / system panels.
      NAS_NAME: "SIDRA-NAS"
      # Set to "true" ONLY when serving over HTTPS (e.g. DSM reverse proxy).
      # Over plain http://nas-ip:8080 it must stay "false" or login breaks.
      COOKIE_SECURE: "false"
      # Default hardware acceleration for transcoding: off | auto | nvenc | vaapi | qsv.
      # Can also be changed live in Settings → Playback. Leave "off" unless
      # you pass a GPU device through (see the commented "devices" block below).
      FFMPEG_HWACCEL: "off"
      # Run as your NAS user so downloaded files get sane ownership.
      # Find yours via `id your-user` over SSH.
      # PUID / PGID are applied by the "user" key below.
    user: "1026:100" # <-- change to your Synology UID:GID
    volumes:
      # Persistent app database + thumbnail cache.
      - /volume1/docker/sidra-media/data:/data
      # New downloads land here (point at any share you like).
      - /volume1/video/Downloads:/downloads/videos
      - /volume1/music/Downloads:/downloads/audio
      # NAS media shares mounted as browse roots. Inside the app you then
      # assign subfolders as libraries (Settings → Media Libraries) and tag
      # each as Movies / TV Shows / Videos / Music. Nothing is indexed until
      # you assign it — mounting alone shows no files.
      - /volume1/video:/media/videos:ro
      - /volume1/music:/media/music:ro
      # Photo share to index in the Photos module (read-only is fine).
      - /volume1/photo:/media/photos:ro
    # ── Optional: GPU transcoding ──────────────────────────────────────
    # Intel/AMD (VAAPI or QSV): expose the render device, then set
    # FFMPEG_HWACCEL to "vaapi" or "qsv" (above) or in Settings → Playback.
    # devices:
    #   - /dev/dri:/dev/dri
    restart: unless-stopped
